<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Watchdog | Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    
    <div class="glass-container login-box">
        <div class="logo">
            <span class="logo-icon">👁️</span>
            <h1>Akıllı <strong>Watchdog</strong></h1>
        </div>
        
        <p class="subtitle">Sisteme giriş yaparak premium SEO analiz raporlarına erişin.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="login-form">
            <div class="input-group">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" name="username" placeholder="admin" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" placeholder="••••••" required>
            </div>
            
            <button type="submit" class="btn-primary">Giriş Yap</button>
        </form>
        
        <div class="footer-note">
            Akıllı Watchdog AI Audit Engine v2.0
        </div>
    </div>

</body>
</html>
